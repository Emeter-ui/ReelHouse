# Fly config for the Reelhouse FastAPI backend.
# Deployed from the backend/ directory: `fly deploy` (run inside backend/).

app = 'reelhouse-backend'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine always running -> no cold start.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/healthz'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512

# Persistent disk for visitor stats (cumulative count survives restarts).
# Provision once: fly volumes create stats_data --size 1 --region sin -a reelhouse-backend
[[mounts]]
  source = 'stats_data'
  destination = '/data'

[env]
  STATS_DATA_DIR = '/data/stats'
